name: Lighthouse Audit
on:
  workflow_call:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Build
        run: npm ci && npm run build

      - name: Audit Light Mode
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: './lighthouserc.light.json'
          uploadArtifacts: true
          temporaryPublicStorage: true
          artifactName: 'lighthouse-light-mode'

      - name: Audit Dark Mode
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: './lighthouserc.dark.json'
          uploadArtifacts: true
          temporaryPublicStorage: true
          artifactName: 'lighthouse-dark-mode'
